# ==============================
# 基础交互
# 目标：统一日常操作习惯，优先贴近 Vim 风格。
# ==============================

# 将前缀键改为 C-a，减少左手移动距离。
set -g prefix C-a

# 开启鼠标支持，便于选择窗格、切换窗口和滚动历史。
set -g mouse on


# ==============================
# 编号与重排
# 目标：让窗口和窗格编号从 1 开始，并在关闭窗口后自动重排。
# ==============================

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on


# ==============================
# 会话管理
# 目标：保留常用的新建与切换操作，并把模糊检索交给 tmux-fzf。
# ==============================

# 为 tmux-fzf 指定唤起键；插件会读取这个环境变量接管前缀 + C-f。
TMUX_FZF_LAUNCH_KEY="C-f"

# 使用前缀 + C-c 直接创建新会话。
bind C-c new-session

# 在当前会话与上一个活跃会话之间来回切换。
bind BTab switch-client -l

# 使用 tmux-fzf 列出并切换会话，适合会话较多时快速定位。
bind-key s run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"


# ==============================
# 全局快捷键
# 目标：放置不需要前缀的按键，避免与会话、窗口、窗格绑定混在一起。
# ==============================

# 不经过前缀直接清屏，并在短暂等待后清理滚动历史。
bind -n C-M-l send-keys C-l \; run 'sleep 0.2' \; clear-history


# ==============================
# 窗格管理
# 目标：使用一致的 Vim 键位完成窗格移动、缩放与拆分。
# ==============================

# 使用 h/j/k/l 在窗格间移动；-r 允许按住连续触发。
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# 使用大写 H/J/K/L 微调窗格尺寸，每次调整 2 个单元。
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# 新建窗格时继承当前目录，避免每次拆分后重新 cd。
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"


# ==============================
# 窗口管理
# 目标：降低窗口管理成本，支持快速切换与重排顺序。
# ==============================

# 使用 Ctrl-h / Ctrl-l 在相邻窗口间切换。
bind -r C-h previous-window
bind -r C-l next-window

# 使用 Ctrl-Shift-H / Ctrl-Shift-L 调整当前窗口在列表中的位置。
bind -r C-S-H swap-window -t -1 \; select-window -t -1
bind -r C-S-L swap-window -t +1 \; select-window -t +1

# 快速回到上一个活跃窗口。
bind Tab last-window

# 使用 tmux-fzf 模糊检索当前会话中的窗口。
bind-key w run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/window.sh switch"



# ==============================
# 复制模式
# 目标：复制行为尽量贴近 Vim 的视觉选择体验。
# ==============================

# 复制模式使用 Vim 键位；这里设为全局，避免只对窗口级别生效。
set -g mode-keys vi

# v 开始选择，Ctrl-v 切换矩形选择，y 复制并退出，Escape 取消。
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel


# ==============================
# 插件
# 目标：保持配置尽量精简，把增强能力交给 TPM 管理。
# ==============================

# TPM
# TPM 负责安装和加载后续插件，是所有插件配置的入口。
set -g @plugin 'tmux-plugins/tpm'

# 通用增强
# sensible 提供一组安全的 tmux 默认值
set -g @plugin 'tmux-plugins/tmux-sensible'
# yank 对接系统剪贴板
set -g @plugin 'tmux-plugins/tmux-yank'
# tmux-fzf 提供模糊检索入口。
set -g @plugin 'sainnhe/tmux-fzf'
# set -g @plugin 'christoomey/vim-tmux-navigator'

# 主题
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'

# 主题风格：Catppuccin 的 mocha 变体。
set -g @catppuccin_flavour 'mocha'

# 会话保存与恢复
# resurrect 保存窗口/窗格布局，continuum 在后台定时保存并支持自动恢复。
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 启动 TPM；插件相关配置需放在此之前。
run '~/.tmux/plugins/tpm/tpm'
