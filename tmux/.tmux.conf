# ==============================
# 基础交互
# 目标：统一日常操作习惯，优先贴近 Vim 风格。
# ==============================

# 将前缀键改为 C-a，减少左手移动距离。
set -g prefix C-a

# 保留一次按键把字面 C-a 发送给程序的能力。
# 典型场景：嵌套 tmux、screen，或需要把 C-a 交给终端内程序。
bind C-a send-prefix

# 移除默认的 C-b 前缀记忆，避免一套配置里同时保留两种入口。
unbind C-b

# 开启鼠标支持，便于选择窗格、切换窗口和滚动历史。
set -g mouse on

# 把外层终端的 truecolor 与 cursor-shape 能力透传进 tmux。
# 这样 Vim 可以在 tmux 内可靠地把普通模式显示为块状、插入模式显示为竖线。
set -ga terminal-features ",*:RGB,*:cursor"

# 窗格分隔线：当前窗格蓝色加粗，其余为较暗蓝色。
set -g pane-active-border-style fg=blue,bold

# 非活跃窗口整体压暗，降低背景窗格的视觉存在感。
set -g window-style 'fg=colour247,bg=colour236'
# 当前窗口保持更高对比度，便于一眼区分焦点所在。
set -g window-active-style 'fg=colour250,bg=black'


# ==============================
# 编号与重排
# 目标：让窗口和窗格编号从 1 开始，并在关闭窗口后自动重排。
# ==============================

# 让窗口编号从 1 开始，和大多数编辑器标签习惯一致。
set -g base-index 1

# 让窗格编号也从 1 开始，避免窗口和窗格一个从 0 一个从 1。
set -g pane-base-index 1

# 关闭中间窗口后自动重排编号，减少“3 号窗口已经没了但 4 号还在”的跳号状态。
set -g renumber-windows on


# ==============================
# 会话管理
# 目标：保留常用的新建与切换操作，并把模糊检索交给 tmux-fzf。
# ==============================

# 使用前缀 + C-c 直接创建新会话。
bind C-c new-session

# 在当前会话与上一个活跃会话之间来回切换。
bind BTab switch-client -l

# 使用 tmux-fzf 列出并切换会话，适合会话较多时快速定位。
bind s run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"


# ==============================
# 无前缀快捷键
# 目标：只放真正值得全局拦截的按键，避免和 prefix 体系混在一起。
# ==============================

# 不经过前缀直接清屏，并在短暂等待后清理滚动历史。
# sleep 用来给前一个 C-l 一点时间，避免历史还没更新就被 clear-history 提前执行。
bind -n C-M-l send-keys C-l \; run 'sleep 0.2' \; clear-history


# ==============================
# 窗格管理
# 目标：使用一致的 Vim 键位完成窗格移动、缩放与拆分。
# ==============================

# 使用 h/j/k/l 在窗格间移动；-r 允许按住连续触发。
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# 使用大写 H/J/K/L 微调窗格尺寸，每次调整 2 个单元。
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# 新建窗格时继承当前目录，避免每次拆分后重新 cd。
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"


# ==============================
# 窗口管理
# 目标：窗口切换和窗口重排独立成组，和 pane 操作分开，减少记忆混淆。
# ==============================

# 使用 Ctrl-h / Ctrl-l 在相邻窗口间切换。
bind -r C-h previous-window
bind -r C-l next-window

# 使用 Ctrl-Shift-H / Ctrl-Shift-L 调整当前窗口在列表中的位置。
# swap 后立即 select 对应位置，保证视觉顺序和当前焦点一致。
bind -r C-M-h swap-window -t -1 \; select-window -t -1
bind -r C-M-l swap-window -t +1 \; select-window -t +1

# 快速回到上一个活跃窗口。
bind Tab last-window

# 使用 tmux-fzf 模糊检索当前会话中的窗口。
bind w run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/window.sh switch"


# ==============================
# 复制模式
# 目标：复制体验尽量贴近 Vim 的视觉选择模型。
# ==============================

# 复制模式使用 Vim 键位；这里设为全局，避免不同窗口继承出不同体验。
set -g mode-keys vi

# v 开始选择，Ctrl-v 切换矩形选择，y 复制并退出。
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Escape 取消复制模式中的当前操作并退出选择状态。
bind -T copy-mode-vi Escape send -X cancel


# ==============================
# 插件
# 目标：主配置只保留“启用什么”和“少量关键参数”，复杂能力交给 TPM。
# 原则：插件声明与插件参数放在同一区块，并且全部位于 TPM 启动之前。
# ==============================

# TPM 是插件管理入口，必须最先声明、最后加载。
set -g @plugin 'tmux-plugins/tpm'

# sensible 提供一组相对保守的默认值，减少手工补基础项的成本。
set -g @plugin 'tmux-plugins/tmux-sensible'

# yank 负责把复制模式内容同步到系统剪贴板。
set -g @plugin 'tmux-plugins/tmux-yank'
# 保留复制模式本身，不在复制后自动退出；这样可以连续复制多段内容。
set -g @yank_action 'copy-pipe' # or 'copy-pipe-and-cancel' for the default

# tmux-fzf 提供会话 / 窗口等模糊检索入口。
set -g @plugin 'sainnhe/tmux-fzf'

# 风格状态栏。
set -g @plugin 'niksingh710/minimal-tmux-status'

# 为 tmux-fzf 设置环境变量。
# 这里必须使用 tmux 的 set-environment，而不是 shell 里的 VAR=value 写法。
set-environment -g TMUX_FZF_LAUNCH_KEY "C-f"
# 搜索窗口时默认包含当前窗口，避免当前焦点窗口被过滤掉。
set-environment -g TMUX_FZF_SWITCH_CURRENT "1"

# resurrect 保存窗口 / 窗格布局，continuum 定时保存并在重启后尝试恢复。
set -g @plugin 'tmux-plugins/tmux-resurrect'
# 把快照目录固定到 ~/.tmux 下，便于和插件目录一起管理与备份。
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# tmux 启动时自动尝试恢复最近一次快照，而不是手工执行 restore。
set -g @continuum-restore 'on'

# 预留：如果以后恢复 vim-tmux-navigator，可以放回这个插件区块里。
# set -g @plugin 'christoomey/vim-tmux-navigator'

# 启动 TPM；插件相关配置必须放在此之前。
run '~/.tmux/plugins/tpm/tpm'
