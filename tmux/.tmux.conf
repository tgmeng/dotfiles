# ==============================
# 基础交互
# 目标：统一日常操作习惯，优先贴近 Vim 风格。
# ==============================

# 将前缀键改为 C-a，减少左手移动距离。
set -g prefix C-a

# 开启鼠标支持，便于选择窗格、切换窗口和滚动历史。
set -g mouse on


# ==============================
# 会话与窗口编号
# 目标：让编号从 1 开始，更符合直觉，并在关闭窗口后自动重排。
# ==============================

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# ==============================
# 会话切换
# 目标：快速定位会话，并保留最近一次会话跳转能力。
# ==============================

# 通过命令提示符输入会话名并切换。
bind C-f command-prompt -p find-session 'switch-client -t %%'

# 在当前会话与上一个活跃会话之间来回切换。
bind BTab switch-client -l


# ==============================
# 窗格操作
# 目标：使用一致的 Vim 键位完成移动、缩放与拆分。
# ==============================

# 使用 h/j/k/l 在窗格间移动；-r 允许按住连续触发。
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# 使用大写 H/J/K/L 微调窗格尺寸，每次调整 2 个单元。
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# 新建窗格时继承当前目录，避免每次拆分后重新 cd。
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"


# ==============================
# 窗口切换与调整
# 目标：降低窗口管理成本，支持快速来回切换和重排顺序。
# ==============================

# 使用 Ctrl-h / Ctrl-l 在相邻窗口间切换。
bind -r C-h previous-window
bind -r C-l next-window

# 使用 Ctrl-Shift-H / Ctrl-Shift-L 调整当前窗口在列表中的位置。
bind -r C-S-H swap-window -t -1 \; select-window -t -1
bind -r C-S-L swap-window -t +1 \; select-window -t +1

# 快速回到上一个活跃窗口。
bind Tab last-window


# ==============================
# 复制模式
# 目标：复制行为尽量贴近 Vim 的视觉选择体验。
# ==============================

set-window-option -g mode-keys vi

# v 开始选择，Ctrl-v 切换矩形选择，y 复制并退出，Escape 取消。
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel


# ==============================
# 插件
# 目标：保持配置尽量精简，把增强能力交给 TPM 管理。
# ==============================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 主题风格：Catppuccin 的 mocha 变体。
set -g @catppuccin_flavour 'mocha'

# 启动 TPM；插件相关配置需放在此之前。
run '~/.tmux/plugins/tpm/tpm'
